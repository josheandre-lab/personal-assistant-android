name: personal_assistant
description: "Kişisel Asistan - Offline Not, Hatırlatma ve Günlük Brifing Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Material 3
  material_design_icons_flutter: ^7.0.7296
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # HTTP for AI API
  http: ^1.1.0
  
  # Sharing
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  
  # UI Components
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  
  # DateTime
  intl: ^0.18.1
  
  # Permission
  permission_handler: ^11.1.0
  
  # Shared Preferences for settings
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
